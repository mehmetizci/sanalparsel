# Render Blueprint - TTS Backend
# Deploy with: render-blueprint https://github.com/your-org/sanalparsel

services:
  - type: web
    name: sanalparsel-tts-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

